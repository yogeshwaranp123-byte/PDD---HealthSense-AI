name: HealthSense Unified E2E & Security Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      vercel_url:
        description: 'Vercel Deployment URL to test'
        required: false
        default: 'https://yogeshwaranp123-byte.github.io/PDD-web-application-/'

jobs:
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping Target URL
        run: |
          URL="${{ github.event.inputs.vercel_url }}"
          if [ -z "$URL" ]; then
            URL="https://yogeshwaranp123-byte.github.io/PDD-web-application-/"
          fi
          echo "Pinging target URL: $URL"
          curl --fail -s -L -I "$URL" | grep -E "HTTP/1\.[01] 200|HTTP/2 200|HTTP/1.1 301|HTTP/1.1 302" || exit 1
          echo "Deployment is verified and active!"

  selenium-tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: verify-deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install selenium webdriver-manager uvicorn

      - name: Start Backend Server in Background
        env:
          MONGO_URI: "mongodb://localhost:27017/testdb"
          SECRET_KEY: "test-secret-key-that-is-very-long-and-secure-2026!"
          ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,https://yogeshwaranp123-byte.github.io"
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          cd ..
          sleep 5
          # Verify backend is up and running before executing tests
          curl --fail -s http://127.0.0.1:8000/ || (cat backend/uvicorn.log && exit 1)

      - name: Run Headless Chrome E2E Tests
        env:
          TARGET_URL: ${{ github.event.inputs.vercel_url || 'https://yogeshwaranp123-byte.github.io/PDD-web-application-/' }}
        run: |
          python tests/test_e2e_selenium.py

  backend-tests:
    name: Run Backend API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi

      - name: Run Backend Pytest Suite
        run: |
          pytest backend/tests/

  verify-reports:
    name: Consolidate & Verify Reports
    runs-on: ubuntu-latest
    needs: [verify-deployment, selenium-tests, backend-tests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Verify All E2E & Security Logs & Publish Combined Results
        run: |
          python tests/publish_combined_results.py

      - name: Upload Website E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Website-E2E-Report
          path: website/E2E_Test_Report_Healthsense AI_2026-06-11T11-32-38.xlsx

      - name: Upload Mobile E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-E2E-Report
          path: mobile/report/E2E_Appium_Report_HealthSense_2026-06-11T20-15-33.xlsx

      - name: Upload Backend Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Backend-Security-Report
          path: backend/Security_Vulnerability_Report_2026-06-11T07-29-57.xlsx
