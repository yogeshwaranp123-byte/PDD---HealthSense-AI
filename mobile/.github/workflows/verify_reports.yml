name: HealthSense E2E & Security Test Verification

on:
  push:
    branches: [ main ]
    paths:
      - 'report/**'
      - 'tests/**'
      - '.github/workflows/verify_reports.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'report/**'
      - 'tests/**'
      - '.github/workflows/verify_reports.yml'
  workflow_dispatch:

jobs:
  verify:
    name: Verify Test Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Test Results to Job Summary
        run: |
          python tests/publish_results.py

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Appium-Report
          path: report/E2E_Appium_Report_HealthSense_2026-06-11T20-15-33.xlsx

      - name: Upload Security Vulnerabilities Report
        uses: actions/upload-artifact@v4
        with:
          name: Security-Vulnerability-Report
          path: report/Security_Vulnerability_Report_2026-06-11T07-29-57.xlsx
